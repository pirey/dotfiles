[general]
import = ["nightfox.toml"]

[window]
# (MacOS)
option_as_alt = "Both"
startup_mode = "Maximized"

dynamic_padding = true

[font]
size = 14.5
normal = { family = "Lilex", style = "Regular" }
offset = { x = 0, y = 8 }
glyph_offset = { x = 0, y = 4 }

[keyboard]
bindings = [
{ key = "Space", mods = "Control", chars = "\u0000" },
{ key = "Key6", mods = "Control", chars = "\u001e" },
{ key = "F", mods = "Command|Control", action = "ToggleSimpleFullscreen" }
]
